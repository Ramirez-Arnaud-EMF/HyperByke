version: '3.8'

services:
  mysql-test:
    image: mysql:8.4
    container_name: hyperbyke-mysql-test
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${TEST_DB_PASSWORD:-test123}
      MYSQL_DATABASE: ${TEST_DB_NAME:-db_hyperbyke_test}
      MYSQL_USER: ${TEST_DB_USER:-test_user}
      MYSQL_PASSWORD: ${TEST_DB_PASSWORD:-test123}
    ports:
      - "3307:3306"
    volumes:
      - db_test_data:/var/lib/mysql
      - ./server/data/database-test.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${TEST_DB_PASSWORD:-test123}"]
      interval: 10s
      timeout: 5s
      retries: 10

  server-test:
    build:
      context: ./server
    container_name: hyperbyke-server-test
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: mysql-test
      DB_USER: ${TEST_DB_USER:-test_user}
      DB_PASSWORD: ${TEST_DB_PASSWORD:-test123}
      DB_NAME: ${TEST_DB_NAME:-db_hyperbyke_test}
      JWT_SECRET: ${JWT_SECRET:-testSecret}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1h}
    depends_on:
      mysql-test:
        condition: service_healthy
    ports:
      - "3001:3000"

volumes:
  db_test_data:
