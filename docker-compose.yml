services:
  mysql:
    image: mysql:8.4
    container_name: hyperbyke-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-emf123}
      MYSQL_DATABASE: ${DB_NAME:-db_hyperbyke}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/data/database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-emf123}"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    container_name: hyperbyke-server
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-emf123}
      DB_NAME: ${DB_NAME:-db_hyperbyke}
      JWT_SECRET: ${JWT_SECRET:-ezForEnce}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1h}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
    container_name: hyperbyke-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: hyperbyke-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER:-root}
      PMA_PASSWORD: ${DB_PASSWORD:-emf123}
      PMA_DB: ${DB_NAME:-db_hyperbyke}
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  db_data:
