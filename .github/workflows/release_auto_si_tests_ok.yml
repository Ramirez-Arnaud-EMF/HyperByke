name: Release automatique si tous les tests sont OK

on:
    workflow_run:
        workflows:
            - Tests unitaires avec Jest
            - Tests d'intégration avec Vitest
            - Tests fonctionnels avec Cypress
            - Tests de conformité avec ESLint
        types:
            - completed

permissions:
    actions: read
    contents: write

concurrency:
    group: release-auto-${{ github.event.workflow_run.head_sha }}
    cancel-in-progress: false

jobs:
    release:
        runs-on: ubuntu-latest
        if: ${{ github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}

        steps:
            - name: Verify all required test workflows succeeded on this commit
              id: gates
              uses: actions/github-script@v7
              with:
                  script: |
                      const required = [
                        'Tests unitaires avec Jest',
                        "Tests d'intégration avec Vitest",
                        'Tests fonctionnels avec Cypress',
                        'Tests de conformité avec ESLint'
                      ];

                      const headSha = context.payload.workflow_run.head_sha;
                      const branch = context.payload.workflow_run.head_branch;

                      const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        head_sha: headSha,
                        branch,
                        event: 'push',
                        status: 'completed',
                        per_page: 100
                      });

                      const byName = new Map();
                      for (const run of data.workflow_runs) {
                        if (!required.includes(run.name)) continue;
                        const previous = byName.get(run.name);
                        if (!previous || new Date(run.created_at) > new Date(previous.created_at)) {
                          byName.set(run.name, run);
                        }
                      }

                      const missing = required.filter((name) => !byName.has(name));
                      if (missing.length > 0) {
                        core.info(`Pas encore tous les workflows terminés pour ${headSha}. Manquants : ${missing.join(', ')}`);
                        core.setOutput('all_ok', 'false');
                        return;
                      }

                      const failed = required.filter((name) => byName.get(name).conclusion !== 'success');
                      if (failed.length > 0) {
                        core.info(`Certains workflows ont échoué pour ${headSha} : ${failed.join(', ')}`);
                        core.setOutput('all_ok', 'false');
                        return;
                      }

                      core.info(`Tous les workflows requis ont réussi pour ${headSha}.`);
                      core.setOutput('all_ok', 'true');

            - name: Read version from package.json
              id: version
              if: steps.gates.outputs.all_ok == 'true'
              uses: actions/github-script@v7
              with:
                  script: |
                      const ref = context.payload.workflow_run.head_sha;

                      const { data: pkgData } = await github.rest.repos.getContent({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        path: 'package.json',
                        ref
                      });

                      if (Array.isArray(pkgData) || !('content' in pkgData)) {
                        core.setFailed('Réponse inattendue pour package.json');
                        return;
                      }

                      const pkg = JSON.parse(Buffer.from(pkgData.content, 'base64').toString('utf8'));

                      if (!pkg.version) {
                        core.setFailed('Aucun champ version dans package.json');
                        return;
                      }

                      const version = String(pkg.version).trim();
                      const tag = `v${version}`;

                      core.info(`Version trouvée : ${version}`);
                      core.setOutput('version', version);
                      core.setOutput('tag', tag);

            - name: Check if tag already exists
              id: check_tag
              if: steps.gates.outputs.all_ok == 'true'
              uses: actions/github-script@v7
              with:
                  script: |
                      const tag = `${{ steps.version.outputs.tag }}`;
                      try {
                        await github.rest.git.getRef({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          ref: `tags/${tag}`
                        });
                        core.info(`Le tag ${tag} existe déjà.`);
                        core.setOutput('exists', 'true');
                      } catch (err) {
                        if (err.status === 404) {
                          core.info(`Le tag ${tag} n'existe pas encore.`);
                          core.setOutput('exists', 'false');
                        } else {
                          throw err;
                        }
                      }

            - name: Create GitHub release (and tag)
              if: steps.gates.outputs.all_ok == 'true' && steps.check_tag.outputs.exists == 'false'
              uses: actions/github-script@v7
              with:
                  script: |
                      const version = `${{ steps.version.outputs.version }}`;
                      const tag = `${{ steps.version.outputs.tag }}`;
                      const target = context.payload.workflow_run.head_sha;

                      await github.rest.repos.createRelease({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        tag_name: tag,
                        target_commitish: target,
                        name: `HyperByke ${tag}`,
                        body: `Release automatique ${tag} — tous les tests unitaires, d'intégration, fonctionnels et de conformité ont réussi.`,
                        draft: false,
                        prerelease: false,
                        generate_release_notes: true
                      });

                      core.info(`Release ${tag} créée sur ${target}.`);

            - name: No release created
              if: steps.gates.outputs.all_ok != 'true' || steps.check_tag.outputs.exists == 'true'
              run: |
                  echo "Pas de release créée."
                  echo "all_ok=${{ steps.gates.outputs.all_ok }}"
                  echo "tag_exists=${{ steps.check_tag.outputs.exists }}"
